<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Zombie Survival</title>
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="ui">
  HP: <span id="hp">100</span><br>

</div>

<canvas id="game"></canvas>

<script src="game.js"></script>

</body>
</html>
